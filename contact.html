<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>Contact | Broughtons Glass Service</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0c0f1a;
  color:#fff;
}

/* HEADER */
header{
  padding:20px;
  text-align:center;
  background:#11152a;
  border-bottom:3px solid #2a6cff;
}

/* NAV */
nav a{
  color:#fff;
  margin:0 10px;
  text-decoration:none;
  font-size:14px;
}

/* SECTION */
.section{
  padding:40px 20px;
  text-align:center;
}

.section h2{
  color:#2a6cff;
}

/* FORM */
form{
  max-width:500px;
  margin:20px auto;
  display:flex;
  flex-direction:column;
}

input, textarea{
  margin:10px 0;
  padding:12px;
  border:none;
  border-radius:6px;
  font-size:14px;
}

textarea{
  resize:none;
}

/* BUTTONS */
button{
  padding:12px;
  background:#c8102e;
  color:#fff;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#a50d24;
}

/* CALL BUTTON */
.call{
  display:inline-block;
  margin-top:20px;
  color:#fff;
  background:#2a6cff;
  padding:12px 20px;
  border-radius:6px;
  text-decoration:none;
  font-weight:bold;
}

.call:hover{
  background:#1e4ed8;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:#11152a;
  color:#aaa;
  border-top:3px solid #c8102e;
}

footer a{
  color:#2a6cff;
}

/* FORM CARD */
.form-card{
  max-width:500px;
  margin:auto;
  background:#ffffff;
  padding:30px 20px;
  border-radius:12px;

  /* depth */
  box-shadow:0 15px 40px rgba(0,0,0,0.12);
}

/* SUBTEXT */
.form-sub{
  color:#555;
  margin-bottom:15px;
}

/* FORM */
form{
  display:flex;
  flex-direction:column;
}

input, textarea{
  margin:10px 0;
  padding:12px;
  border:1px solid #ddd;
  border-radius:6px;
  font-size:14px;
}

textarea{
  resize:none;
}

/* BUTTON */
button{
  margin-top:10px;
  padding:12px;
  background:#c8102e;
  color:#fff;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#a50d24;
}

/* CALL BUTTON */
.call{
  display:block;
  margin-top:20px;
  background:#0d2a5c;
  color:#fff;
  padding:12px;
  border-radius:6px;
  text-decoration:none;
  font-weight:bold;
}

.call:hover{
  background:#091f47;
}

.form-card{
  transition:0.3s ease;
}

.form-card:hover{
  transform:translateY(-3px);
}

</style>
</head>

<body>

<header>
  <h2>Broughtons Glass Service</h2>
  <nav>
    <a href="index.html">Home</a>
    <a href="work.html">Work</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<section class="section">

  <div class="form-card">

    <h2>Request a Quote</h2>
    <p class="form-sub">Send us a message and we will get back to you quickly.</p>

    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="tel" placeholder="Phone Number" required>
      <input type="email" placeholder="Email (optional)">
      <textarea rows="5" placeholder="Tell us about your project"></textarea>
      <button type="submit">Send Request</button>
    </form>

    <a href="tel:16065425581" class="call">Call Now</a>

  </div>

</section>

<footer>

  <span style="font-size:13px;color:#777;">

  </span>
</footer>

</html>
